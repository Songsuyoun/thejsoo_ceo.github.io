<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대량이체 엑셀 생성기 · 더제이수</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
header{margin-bottom:2rem}
header h1{font-size:20px;font-weight:600}
header p{font-size:13px;color:#888;margin-top:4px}

.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;color:#aaa;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:1rem}

.input-area{width:100%;min-height:180px;font-size:12px;font-family:-apple-system,sans-serif;border:0.5px solid #ddd;border-radius:8px;padding:12px;background:#fafafa;color:#1a1a1a;resize:vertical;line-height:1.8;outline:none;transition:border-color 0.15s}
.input-area:focus{border-color:#aaa;background:#fff}
.input-area::placeholder{color:#ccc;font-size:12px;line-height:1.9}

.memo-row{display:flex;align-items:center;gap:10px;margin-top:1rem;flex-wrap:wrap}
.memo-row label{font-size:13px;color:#555;font-weight:500;white-space:nowrap}
.memo-input{padding:7px 12px;border-radius:8px;border:0.5px solid #ddd;background:#fff;font-size:13px;font-family:inherit;color:#1a1a1a;outline:none;width:220px}
.memo-input:focus{border-color:#aaa}
.memo-hint{font-size:11px;color:#aaa}

.btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;align-items:center}
.btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid #ddd;background:transparent;color:#1a1a1a;font-family:inherit;transition:all 0.15s}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1a1a1a;color:#fff;border-color:transparent}
.btn-primary:hover{background:#333}
.btn-add{background:#f0f7ff;color:#185FA5;border-color:#b5d4f4}
.btn-add:hover{background:#dceeff}
.btn-ghost{color:#999;border-color:transparent}
.btn-ghost:hover{background:#f0f0f0;color:#555}
.btn-green{background:#1a6b3a;color:#fff;border-color:transparent;display:inline-flex;align-items:center;gap:6px}
.btn-green:hover{background:#145530}

.err-msg{font-size:12px;color:#A32D2D;margin-top:8px;padding:8px 12px;background:#FCEBEB;border-radius:8px;display:none}

/* 파싱 결과 카드 */
.parsed-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.parsed-item{background:#fafafa;border:0.5px solid #e0e0e0;border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;position:relative}
.parsed-item .num{font-size:11px;color:#ccc;font-weight:600;min-width:18px;margin-top:2px}
.parsed-info{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6px 12px}
.parsed-field{display:flex;flex-direction:column;gap:2px}
.parsed-field label{font-size:10px;color:#aaa;font-weight:600;letter-spacing:0.3px;text-transform:uppercase}
.parsed-field input{font-size:13px;font-family:-apple-system,sans-serif;border:0.5px solid #e0e0e0;border-radius:6px;padding:5px 8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
.parsed-field input:focus{border-color:#aaa}
.parsed-field input.mono{font-family:'Courier New',monospace;font-size:12px}
.parsed-field input.amount{font-weight:600;color:#1a6b3a}
.del-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:16px;padding:2px 4px;line-height:1;margin-top:1px}
.del-btn:hover{color:#e24b4a}

.result-section{display:none}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:#f5f5f3;border-radius:8px;padding:12px 14px}
.stat-label{font-size:11px;color:#aaa;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600}
.stat-sub{font-size:11px;color:#888;margin-top:2px}

.result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
th{background:#fafafa;color:#888;font-weight:600;padding:8px 10px;text-align:left;border-bottom:0.5px solid #e8e8e8;white-space:nowrap;font-size:11px}
td{padding:8px 10px;border-bottom:0.5px solid #f0f0f0;color:#1a1a1a;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.num-col{text-align:right;font-family:'Courier New',monospace}

.hint-box{background:#fafafa;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:11px;color:#888;line-height:1.8}
.hint-box b{font-weight:600;color:#444}
.point{color:#c47b00;font-weight:500}

@media(max-width:600px){
  .parsed-info{grid-template-columns:1fr 1fr}
  .stat-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>대량이체 엑셀 생성기</h1>

  </header>

  <!-- 입력 카드 -->
  <div class="card">
    <div class="card-title">입금 요청 문자 붙여넣기</div>
    <div class="hint-box">
      <b>아래 텍스트 창에 입금 요청 문자를 붙여넣으면 자동으로 파싱됩니다</b><br>
      은행명 + 계좌번호 + 예금주, 금액(원)을 자동 인식합니다<br>
      <span class="point">✦ 여러 건을 한꺼번에 붙여넣거나, 건별로 추가할 수 있어요</span>
    </div>

    <textarea class="input-area" id="msg-input" placeholder="예시)
날짜: 040일
시간: 10-14
인원: 2
시간: 4
금액 308,000 원 부가세 포함 금액입니다.

은행계좌
신한은행 110-500-502030 손강석
6시간안에 미입금시 예약은 자동취소 됩니다"></textarea>

    <div class="memo-row">
      <label>E열 (내 통장 메모)</label>
      <input class="memo-input" id="memo-input" type="text" placeholder="예: 스튜디오예약금" maxlength="14">
      <span class="memo-hint">최대 14자</span>
    </div>

    <div id="err-msg" class="err-msg"></div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="parseAndAdd()">추가하기</button>
      <button class="btn btn-ghost" onclick="document.getElementById('msg-input').value=''">지우기</button>
    </div>
  </div>

  <!-- 파싱된 목록 -->
  <div class="card" id="list-card" style="display:none">
    <div class="card-title">이체 목록 <span id="list-count" style="color:#1a1a1a;font-size:13px;font-weight:700"></span></div>
    <div class="parsed-list" id="parsed-list"></div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="generateExcel()">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 10v1.5A1.5 1.5 0 003.5 13h7A1.5 1.5 0 0012 11.5V10" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        엑셀 다운로드
      </button>
      <button class="btn btn-ghost" onclick="clearAll()">전체 초기화</button>
    </div>
  </div>

</div>

<script>
const BANK_MAP = {
  '국민':4,'kb':4,'004':4,
  '신한':88,'088':88,
  '우리':20,'020':20,
  '하나':81,'keb하나':81,'외환':81,'구외환':81,'081':81,
  '농협':11,'농협은행':11,'011':11,
  '기업':3,'ibk':3,'003':3,
  '씨티':27,'027':27,
  'sc':23,'스탠다드차타드':23,'제일':23,'023':23,
  '수협':7,'007':7,
  '경남':39,'039':39,
  '광주':34,'034':34,
  '전북':37,'037':37,
  '제주':35,'035':35,
  '부산':32,'032':32,
  '새마을':45,'새마을금고':45,'045':45,
  '신협':48,'048':48,
  '우체국':71,'071':71,
  '케이뱅크':89,'kbank':89,'089':89,
  '카카오':90,'카카오뱅크':90,'090':90,
  '토스':92,'토스뱅크':92,'092':92,
  '저축':50,'050':50,
  '산업':2,'002':2,
  '아이엠':31,'im':31,'031':31,
};

let items = [];
let nextId = 1;

function getBankCode(raw) {
  if (!raw) return '';
  let k = String(raw).replace(/\(.*?\)/g,'').trim().toLowerCase().replace(/\s+/g,'').replace(/은행$/,'');
  if (BANK_MAP[k] !== undefined) return String(BANK_MAP[k]).padStart(3,'0');
  const num = String(raw).trim().replace(/[^0-9]/g,'');
  if (num.length >= 2 && num.length <= 3) return num.padStart(3,'0');
  return String(raw).trim();
}

function parseMsg(text) {
  // 금액 파싱: "308,000 원" / "308000원" / "금액 308,000"
  let amount = 0;
  const amtMatch = text.match(/금액\s*[:：]?\s*([\d,]+)\s*원/)
    || text.match(/([\d,]+)\s*원\s*(부가세|입금|이체|포함)/);
  if (amtMatch) {
    amount = parseInt(amtMatch[1].replace(/,/g,''), 10);
  } else {
    // 숫자만 있는 금액 탐색 (5자리 이상)
    const nums = [...text.matchAll(/([\d,]{5,})/g)];
    for (const m of nums) {
      const n = parseInt(m[1].replace(/,/g,''), 10);
      if (n >= 1000 && n <= 100000000) { amount = n; break; }
    }
  }

  // 계좌 파싱: "신한은행 110-500-502030 손강석"
  // 패턴: 은행명 계좌번호(숫자-숫자) 이름
  let bankRaw = '', acct = '', name = '';

  const acctLine = text.match(/([가-힣a-zA-Z]+은행|[가-힣]{2,4}은행?|[가-힣]{2,6}뱅크)\s+([\d\-]+)\s+([가-힣]{2,5})/);
  if (acctLine) {
    bankRaw = acctLine[1];
    acct    = acctLine[2].replace(/-/g,'');
    name    = acctLine[3];
  } else {
    // 계좌번호만 있는 경우
    const acctOnly = text.match(/([\d]{3,6}[-\s][\d]{2,6}[-\s][\d]{3,8})/);
    if (acctOnly) acct = acctOnly[1].replace(/[-\s]/g,'');
  }

  return {
    id: nextId++,
    bankRaw,
    bankCode: getBankCode(bankRaw),
    acct,
    name,
    amount,
    memo: document.getElementById('memo-input').value.trim().slice(0,14),
  };
}

function parseAndAdd() {
  showErr('');
  const text = document.getElementById('msg-input').value.trim();
  if (!text) { showErr('문자를 붙여넣어 주세요.'); return; }

  const parsed = parseMsg(text);

  if (!parsed.amount) { showErr('금액을 인식하지 못했습니다. 직접 수정해주세요.'); }
  if (!parsed.acct)   { showErr('계좌번호를 인식하지 못했습니다. 직접 수정해주세요.'); }

  items.push(parsed);
  document.getElementById('msg-input').value = '';
  renderList();
}

function renderList() {
  const card = document.getElementById('list-card');
  card.style.display = items.length ? 'block' : 'none';
  document.getElementById('list-count').textContent = `(${items.length}건)`;

  document.getElementById('parsed-list').innerHTML = items.map((item, idx) => `
    <div class="parsed-item" id="item-${item.id}">
      <span class="num">${idx+1}</span>
      <div class="parsed-info">
        <div class="parsed-field">
          <label>은행코드</label>
          <input class="mono" value="${item.bankCode}" onchange="updateItem(${item.id},'bankCode',this.value)" placeholder="예: 088">
        </div>
        <div class="parsed-field">
          <label>계좌번호</label>
          <input class="mono" value="${item.acct}" onchange="updateItem(${item.id},'acct',this.value)" placeholder="숫자만">
        </div>
        <div class="parsed-field">
          <label>금액 (원)</label>
          <input class="amount" value="${item.amount ? item.amount.toLocaleString() : ''}" onchange="updateItem(${item.id},'amount',this.value)" placeholder="예: 308,000">
        </div>
        <div class="parsed-field">
          <label>예금주 (D열)</label>
          <input value="${item.name}" onchange="updateItem(${item.id},'name',this.value)" placeholder="이름" maxlength="10">
        </div>
        <div class="parsed-field">
          <label>내 통장 메모 (E열)</label>
          <input value="${item.memo}" onchange="updateItem(${item.id},'memo',this.value)" placeholder="최대 14자" maxlength="14">
        </div>
      </div>
      <button class="del-btn" onclick="deleteItem(${item.id})">✕</button>
    </div>
  `).join('');
}

function updateItem(id, field, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (field === 'amount') {
    item.amount = parseInt(String(value).replace(/[^0-9]/g,''), 10) || 0;
  } else {
    item[field] = value.trim();
  }
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  renderList();
}

function clearAll() {
  items = [];
  renderList();
  showErr('');
}

function generateExcel() {
  if (!items.length) { alert('이체 목록이 없습니다.'); return; }

  // 최신 값 동기화 (input에서 직접 수정한 경우)
  items.forEach(item => {
    const el = document.getElementById(`item-${item.id}`);
    if (!el) return;
    const inputs = el.querySelectorAll('input');
    item.bankCode = inputs[0].value.trim();
    item.acct     = inputs[1].value.replace(/[^0-9]/g,'');
    item.amount   = parseInt(inputs[2].value.replace(/[^0-9]/g,''), 10) || 0;
    item.name     = inputs[3].value.trim();
    item.memo     = inputs[4].value.trim().slice(0,14);
  });

  const wsData = items.map(r => [
    r.bankCode,  // A: 은행코드
    r.acct,      // B: 계좌번호
    r.amount,    // C: 이체금액
    r.name,      // D: 받는분 통장표시
    r.memo,      // E: 내 통장 메모
  ]);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  ws['!cols'] = [{wch:8},{wch:22},{wch:14},{wch:12},{wch:16}];

  items.forEach((_, i) => {
    [0,1,3,4].forEach(c => {
      const addr = XLSX.utils.encode_cell({r:i, c});
      if (ws[addr]) { ws[addr].t = 's'; ws[addr].z = '@'; }
    });
    const cAddr = XLSX.utils.encode_cell({r:i, c:2});
    if (ws[cAddr]) { ws[cAddr].t = 'n'; ws[cAddr].z = '#,##0'; }
  });

  XLSX.utils.book_append_sheet(wb, ws, '다건이체');

  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  const total = items.reduce((s,r) => s + r.amount, 0);
  XLSX.writeFile(wb, `대량이체_${items.length}건_${total.toLocaleString()}원_${dateStr}.xlsx`);
}

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
